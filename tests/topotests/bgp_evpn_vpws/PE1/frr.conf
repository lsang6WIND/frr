debug bgp zebra
debug bgp evpn vpws
debug zebra pseudowires
!
interface lo
 ip address 10.10.10.10/32
 ip address 10.10.10.11/32
interface PE1-eth1
 ip address 10.20.1.1/24
!
router ospf
 network 10.20.0.0/16 area 0
 network 10.10.10.10/32 area 0
 network 10.10.10.11/32 area 0
!
int PE1-eth1
 ip ospf hello-interval 2
 ip ospf dead-interval 5
!
router bgp 65000
 bgp router-id 10.10.10.10
 no bgp default ipv4-unicast
 neighbor 10.30.30.30 remote-as 65000
 neighbor 10.30.30.30 update-source lo
 address-family l2vpn evpn
  neighbor 10.30.30.30 activate
  advertise-all-vni
  advertise-svi-ip
  vni 101
   rd 10.10.10.10:1
   route-target both 65000:1
 exit
exit
!
l2vpn test type vpws
 member evpn vxlan101
  vni 101
  neighbor evpn evi 100 local-ac-id 111 remote-ac-id 222
 member evpn vxlan102
  vni 102
  neighbor evpn evi 102 local-ac-id 1 remote-ac-id 2
!
